spring.application.name=EmployeeManagementSystem

# Primary Data Source (Spring uses this automatically for JPA)
spring.datasource.jdbc-url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Secondary Data Source (Custom config)
app.datasource.secondary.jdbc-url=jdbc:h2:mem:secondarydb
app.datasource.secondary.driver-class-name=org.h2.Driver
app.datasource.secondary.username=sa
app.datasource.secondary.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
