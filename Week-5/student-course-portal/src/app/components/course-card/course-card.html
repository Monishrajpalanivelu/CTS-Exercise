<div class="card" [ngClass]="cardClasses" [ngStyle]="{'border-left': '6px solid ' + (course.gradeStatus === 'passed' ? 'green' : course.gradeStatus === 'failed' ? 'red' : 'grey')}">
  <h3>{{ course.name }}</h3>
  <p>Code: {{ course.code }}</p>
  <p>Credits: {{ course.credits | creditLabel }}</p>
  
  <div [ngSwitch]="course.gradeStatus" style="margin-bottom: 8px;">
    <span *ngSwitchCase="'passed'" style="color: green; font-weight: bold;">Passed</span>
    <span *ngSwitchCase="'failed'" style="color: red; font-weight: bold;">Failed</span>
    <span *ngSwitchCase="'pending'" style="color: grey; font-weight: bold;">Pending</span>
    <span *ngSwitchDefault>Unknown</span>
  </div>

  <button (click)="isExpanded = !isExpanded" style="margin-right: 8px;">Show Details</button>
  <button (click)="enrollCourse()">Enroll</button>
</div>
